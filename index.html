<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Digimon Legends</title>
  <link rel="stylesheet" href="style/main.css">
</head>

<body>

  <div id="screen-home" class="screen">
    <div id="main-menu">

      <div class="menu-card" data-screen="hunts">
        <h2>Hunts</h2>
        <p>Missões e batalhas</p>
      </div>

      <div class="menu-card" data-screen="team">
        <h2>Team</h2>
        <p>Seus Digimons</p>
      </div>

      <div class="menu-card" data-screen="digifarm">
        <h2>DigiFarm</h2>
        <p>Treine e evolua seus Digimons</p>
      </div>

      <div class="menu-card" data-screen="digidex">
        <h2>DigiDex</h2>
        <p>Veja todos os Digimons</p>
      </div>

      <div class="menu-card" data-screen="options">
        <h2>Options</h2>
        <p>Configurações</p>
      </div>

    </div>
  </div>

  <div id="screen-hunts" class="screen">

    <h2>Hunts</h2>

    <button id="hunt-search">Search Digimon</button>

    <!-- Tela de batalha -->
    <div id="hunt-battle" style="margin-top:20px;">
      <div id="battle-screen" style="display:flex; justify-content:space-around; margin-bottom:20px;">
        <!-- Jogador -->
        <div id="player-container" style="text-align:center;">
          <img id="player-sprite" src="assets/sprites/gabumon.png" alt="Player Digimon"
            style="width:100px; height:100px;">
          <div>
            <div style="width:100px; height:10px; background:#555; margin-top:5px;">
              <div id="player-hp-bar" style="height:10px; background:red; width:100%;"></div>
            </div>
            <div style="width:100px; height:5px; background:#555; margin-top:2px;">
              <div id="player-sp-bar" style="height:5px; background:blue; width:100%;"></div>
            </div>
          </div>
          <div id="player-name" style="margin-top:5px; font-weight:bold;"></div>
        </div>

        <!-- Inimigo -->
        <div id="enemy-container" style="text-align:center;">
          <img id="enemy-sprite" src="assets/sprites/biyomon.png" alt="Enemy Digimon"
            style="width:100px; height:100px;">
          <div>
            <div style="width:100px; height:10px; background:#555; margin-top:5px;">
              <div id="enemy-hp-bar" style="height:10px; background:red; width:100%;"></div>
            </div>
            <div style="width:100px; height:5px; background:#555; margin-top:2px;">
              <div id="enemy-sp-bar" style="height:5px; background:blue; width:100%;"></div>
            </div>
          </div>
          <div id="enemy-name" style="margin-top:5px; font-weight:bold;"></div>
        </div>
      </div>

      <!-- Log dos turnos -->
      <div id="battle-log" style="border-top:1px solid #aaa; padding-top:10px; max-height:200px; overflow-y:auto;">
      </div>
    </div>

    <button class="back-home">Voltar</button>

  </div>


  <div id="screen-newgame" class="screen">

    <div class="newgame-container">

      <h1>NEW TAMER</h1>

      <div class="player-input">
        <label>Seu nome</label>
        <input id="player-name-input" type="text">
      </div>

      <h3>Escolha seu Digimon inicial</h3>

      <div id="starter-select">

        <div class="starter-card" data-digimon="Agumon">
          <img src="assets/sprites/agumon.png">
          <p>Agumon</p>
        </div>

        <div class="starter-card" data-digimon="Gabumon">
          <img src="assets/sprites/gabumon.png">
          <p>Gabumon</p>
        </div>

        <div class="starter-card" data-digimon="Patamon">
          <img src="assets/sprites/patamon.png">
          <p>Patamon</p>
        </div>

      </div>

      <div id="starter-info"></div>

      <button id="confirm-starter" disabled>
        Confirmar escolha
      </button>

    </div>

  </div>

  <div id="screen-hunts" class="screen">
    <h2>Hunts</h2>
    <button class="back-home">Voltar</button>
  </div>

  <div id="screen-team" class="screen">
    <h2>Your Team</h2>
    <div id="team-container"></div>
    <button class="back-home">Voltar</button>
  </div>

  <div id="screen-digifarm" class="screen">
    <h2>DigiFarm</h2>
    <button class="back-home">Voltar</button>
  </div>

  <div id="screen-digidex" class="screen">
    <h2>DigiDex</h2>
    <div id="digidex"></div>
    <button class="back-home">Voltar</button>
  </div>

  <div id="screen-options" class="screen">
    <h2>Options</h2>
    <button id="reset-save">
      Apagar Save
    </button>
    <button class="back-home">Voltar</button>
  </div>


  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- scripts do jogo -->
  <script src="scripts/app.js"></script>
  <script src="data/digimons.js"></script>

  <script src="scripts/digimonFactory.js"></script>
  <script src="scripts/player.js"></script>

  <script src="scripts/router.js"></script>
  <script src="scripts/digidex.js"></script>
  <script src="scripts/team.js"></script>
  <script src="scripts/newGame.js"></script>
  <script src="scripts/hunts.js"></script>
  <script src="scripts/battle.js"></script>

</body>

</html>
